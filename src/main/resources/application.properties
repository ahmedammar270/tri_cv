spring.datasource.url=jdbc:mysql://localhost:3306/tricv_db
spring.datasource.username=root
spring.datasource.password=root1234
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=2GB
spring.servlet.multipart.enabled=true
server.tomcat.max-swallow-size=2GB
server.tomcat.max-http-form-post-size=2GB
server.port=8080
groq.api.key=${GROQ_API_KEY}
# Grandes ecoles d'ingenieurs publiques tunisiennes (score academique maximal)
recrutement.ecoles.publiques-ingenieur=ENIT,ENSI,INSAT,SUPCOM,ENIS,ENIM,EPT,ENISo,ENICarthage,ENICar,FST
# Ecoles d'ingenieurs privees reconnues
recrutement.ecoles.privees-ingenieur=ESPRIT,SUPCOM Prive,TEK-UP,Polytechnique Sousse,Mediterranean School of Business,IIT
